    - scam
    - rug
    - honeypot
  block_missing_socials: false
  min_fdv_usd: 0
  max_fdv_usd: 10000000
  max_entry_move_pct: 35

gmgn_filters:
  enabled: true
  allowed_launchpad_platforms:
    - Pump.fun
    - letsbonk
  max_open_minutes: 90
  max_rug_ratio: 0.3
  max_bundler_rate: 0.45
  max_top_10_holder_rate: 0.55
